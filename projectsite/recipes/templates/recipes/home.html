<h1>Recipe Book</h1>

<form method="GET">

    <input type="text" name="q" placeholder="Search recipes...">

    <button type="submit">Search</button>

</form>

{% for recipe in recipes %}

    <h2>{{ recipe.title }}</h2>

    <img src="{{ recipe.image.url }}" width="300">

    <p>{{ recipe.description }}</p>

{% endfor %}
