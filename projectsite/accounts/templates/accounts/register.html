<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Cooking Buddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --red-primary: #e63946;
      --red-dark: #c1121f;
      --red-light: #ff6b6b;
      --red-bg: #fff5f5;
      --white: #ffffff;
      --text-dark: #2b2d42;
      --text-light: #6c757d;
      --text-sub: #8a8f98;
      --gray-light: #f8f9fa;
      --border: #ece6d8;
      --shadow: 0 4px 6px rgba(0,0,0,0.08);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.12);
      --radius-sm: 10px;
      --radius: 14px;
      --radius-lg: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      background: linear-gradient(180deg, #fffaf8 0%, #fff1f2 100%);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      border: none;
      border-radius: 999px;
      padding: .9rem 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: .25s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary { background: linear-gradient(135deg, var(--red-primary), var(--red-dark)); color: var(--white); }
    .btn-secondary { background: var(--white); color: var(--red-dark); border: 1px solid var(--border); }
    .btn-sm { padding: .7rem 1rem; font-size: .92rem; }
    .btn-full { width: 100%; }
    .btn-lg { padding: 1rem 1.2rem; font-size: 1rem; }

    .navbar {
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .navbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
    }
    .navbar-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      color: var(--red-dark);
      font-size: 1.2rem;
    }
    .navbar-brand span { color: var(--red-primary); }
    .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: var(--red-bg);
      color: var(--red-primary);
    }

    .auth-page {
      min-height: calc(100vh - 72px);
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
    }

    .auth-visual {
      position: relative;
      overflow: hidden;
      min-height: 760px;
      background: #111;
    }
    .auth-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.05);
    }
    .auth-visual-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.55));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 42px;
      color: #fff;
    }
    .auth-visual-title {
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 800;
      margin-bottom: 10px;
    }
    .auth-visual-sub {
      max-width: 430px;
      color: rgba(255,255,255,.82);
      font-size: 1rem;
    }

    .auth-form-panel {
      display: grid;
      place-items: center;
      padding: 36px 20px;
    }
    .auth-form-box {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 34px;
      backdrop-filter: blur(12px);
    }

    h2 { font-size: 2rem; margin-bottom: 6px; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      margin-bottom: 7px;
      font-weight: 600;
      color: var(--text-dark);
    }
    .input-group {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      color: var(--text-sub);
      z-index: 2;
    }
    .form-control {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 44px 14px 42px;
      font: inherit;
      background: #fff;
      outline: none;
      transition: .2s ease;
    }
    .form-control:focus {
      border-color: var(--red-primary);
      box-shadow: 0 0 0 4px rgba(230,57,70,.12);
    }
    .input-eye {
      position: absolute;
      right: 10px;
      border: none;
      background: transparent;
      color: var(--text-sub);
      cursor: pointer;
      padding: 8px;
      border-radius: 999px;
    }
    .input-eye:hover { color: var(--red-primary); }

    .pw-strength { margin-top: 10px; }
    .pw-strength-bar {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: #f1f3f5;
      overflow: hidden;
    }
    .pw-strength-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ef4444, #f59e0b, #16a34a);
      transition: width .25s ease;
    }
    .pw-strength-text {
      display: inline-block;
      margin-top: 6px;
      font-size: .85rem;
      color: var(--text-sub);
    }

    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: var(--text-dark);
      font-weight: 500;
      cursor: pointer;
      user-select: none;
    }
    .checkbox-group input { accent-color: var(--red-primary); margin-top: 4px; }

    .form-error {
      display: block;
      min-height: 18px;
      margin-top: 6px;
      color: #dc2626;
      font-size: .86rem;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--text-sub);
      font-size: .9rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .auth-divider span { white-space: nowrap; }

    .social-auth {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .social-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text-dark);
      font-weight: 600;
      cursor: pointer;
      transition: .25s ease;
    }
    .social-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
      border-color: rgba(230,57,70,.35);
    }
    .social-google { color: #db4437; }
    .social-facebook { color: #1877f2; }

    .auth-footer {
      margin-top: 22px;
      text-align: center;
      color: var(--text-light);
    }
    .auth-footer a {
      color: var(--red-primary);
      font-weight: 700;
    }
    .auth-footer a:hover { color: var(--red-dark); }

    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 3000;
      display: grid;
      gap: 10px;
    }
    .toast {
      background: #fff;
      border-left: 4px solid var(--red-primary);
      color: var(--text-dark);
      box-shadow: var(--shadow-lg);
      border-radius: 12px;
      padding: 12px 14px;
      min-width: 240px;
      max-width: 320px;
    }
    .toast.info { border-left-color: #2563eb; }
    .toast.success { border-left-color: #16a34a; }
    .toast.error { border-left-color: #dc2626; }

    @media (max-width: 980px) {
      .auth-page { grid-template-columns: 1fr; }
      .auth-visual { min-height: 320px; }
      .auth-visual-overlay { padding: 28px; }
    }

    @media (max-width: 640px) {
      .form-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .auth-form-box { padding: 24px 18px; }
      .navbar-inner { gap: 10px; }
      .navbar .btn-sm { padding: .65rem .9rem; }
      .auth-visual-title { font-size: 1.7rem; }
      .social-auth { grid-template-columns: 1fr; }
      .social-btn { font-size: .95rem; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <div class="brand-icon"><i class="fas fa-utensils"></i></div>Cooking<span>Buddy</span>
      </a>
      <div style="margin-left:auto;display:flex;gap:10px">
        <a href="login.html" class="btn btn-secondary btn-sm">Login</a>
        <a href="register.html" class="btn btn-primary btn-sm">Sign Up</a>
      </div>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-visual">
    <img src="https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=800&auto=format&fit=crop&q=80" alt="Cooking">
    <div class="auth-visual-overlay">
      <div class="auth-visual-title">Join Our Kitchen Community</div>
      <p class="auth-visual-sub">Share your recipes, discover new flavors, and connect with fellow food lovers.</p>
    </div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-form-box">
      <div style="text-align:center;margin-bottom:28px">
        <a href="index.html" class="navbar-brand" style="justify-content:center;display:inline-flex;margin-bottom:16px">
          <div class="brand-icon"><i class="fas fa-utensils"></i></div>
          Cooking<span>Buddy</span>
        </a>
        <h2>Create Your Account</h2>
        <p style="color:var(--text-light);margin-top:4px">Start your culinary journey today</p>
      </div>

      <form id="register-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="reg-username">Username</label>
            <div class="input-group">
              <i class="fas fa-user input-icon"></i>
              <input type="text" class="form-control" id="reg-username" placeholder="chef_hazel" autocomplete="username">
            </div>
            <span class="form-error" id="username-error"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-fullname">Full Name</label>
            <div class="input-group">
              <i class="fas fa-id-card input-icon"></i>
              <input type="text" class="form-control" id="reg-fullname" placeholder="Hazel Choi">
            </div>
            <span class="form-error" id="fullname-error"></span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-email">Email Address</label>
          <div class="input-group">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" class="form-control" id="reg-email" placeholder="you@example.com" autocomplete="email">
          </div>
          <span class="form-error" id="email-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-group">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" class="form-control" id="password" placeholder="Create a strong password" autocomplete="new-password">
            <button type="button" class="input-eye" id="toggle-password" aria-label="Toggle password"><i class="fas fa-eye"></i></button>
          </div>
          <div class="pw-strength" id="pw-strength">
            <div class="pw-strength-bar"><div class="pw-strength-fill"></div></div>
            <span class="pw-strength-text"></span>
          </div>
          <span class="form-error" id="password-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <div class="input-group">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" class="form-control" id="confirm-password" placeholder="Repeat your password" autocomplete="new-password">
            <button type="button" class="input-eye" id="toggle-confirm-password" aria-label="Toggle password"><i class="fas fa-eye"></i></button>
          </div>
          <span class="form-error" id="confirm-error"></span>
        </div>

        <div class="form-group">
          <label class="checkbox-group">
            <input type="checkbox" id="terms-check">
            <span>I agree to the <a href="#" style="color:var(--red-primary);font-weight:600">Terms of Service</a> and <a href="#" style="color:var(--red-primary);font-weight:600">Privacy Policy</a></span>
          </label>
          <span class="form-error" id="terms-error"></span>
        </div>

        <div class="form-group">
          <label class="checkbox-group">
            <input type="checkbox" id="newsletter-check" checked>
            <span>Send me recipe inspiration & updates</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

      <div class="auth-divider"><span>or continue with</span></div>

      <div class="social-auth">
        <button type="button" class="social-btn social-google" onclick="showToast('Google signup coming soon!','info')">
          <i class="fab fa-google"></i> Continue with Google
        </button>
        <button type="button" class="social-btn social-facebook" onclick="showToast('Facebook signup coming soon!','info')">
          <i class="fab fa-facebook-f"></i> Continue with Facebook
        </button>
      </div>

      <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
const $ = (id) => document.getElementById(id);

function showToast(message, type = 'info') {
  const wrap = $('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  wrap.appendChild(toast);
  setTimeout(() => toast.remove(), 2600);
}

function toggleInput(id, btnId) {
  const input = $(id);
  const icon = $(btnId).querySelector('i');
  const isPassword = input.type === 'password';
  input.type = isPassword ? 'text' : 'password';
  icon.className = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
}

function updateStrength(password) {
  const fill = document.querySelector('.pw-strength-fill');
  const text = document.querySelector('.pw-strength-text');
  let score = 0;
  if (password.length >= 8) score++;
  if (/[A-Z]/.test(password)) score++;
  if (/[0-9]/.test(password)) score++;
  if (/[^A-Za-z0-9]/.test(password)) score++;
  fill.style.width = `${(score / 4) * 100}%`;
  const labels = ['Very weak', 'Weak', 'Fair', 'Good', 'Strong'];
  text.textContent = password ? labels[score] : '';
}

$('toggle-password').addEventListener('click', () => toggleInput('password', 'toggle-password'));
$('toggle-confirm-password').addEventListener('click', () => toggleInput('confirm-password', 'toggle-confirm-password'));
$('password').addEventListener('input', (e) => updateStrength(e.target.value));

$('register-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const username = $('reg-username').value.trim();
  const fullname = $('reg-fullname').value.trim();
  const email = $('reg-email').value.trim();
  const password = $('password').value.trim();
  const confirm = $('confirm-password').value.trim();
  const terms = $('terms-check').checked;

  ['username-error','fullname-error','email-error','password-error','confirm-error','terms-error'].forEach(id => $(id).textContent = '');

  let valid = true;

  if (!username) { $('username-error').textContent = 'Username is required.'; valid = false; }
  if (!fullname) { $('fullname-error').textContent = 'Full name is required.'; valid = false; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { $('email-error').textContent = 'Enter a valid email address.'; valid = false; }
  if (password.length < 8) { $('password-error').textContent = 'Password must be at least 8 characters.'; valid = false; }
  if (password !== confirm) { $('confirm-error').textContent = 'Passwords do not match.'; valid = false; }
  if (!terms) { $('terms-error').textContent = 'You must accept the terms to continue.'; valid = false; }

  if (!valid) {
    showToast('Please fix the errors and try again.', 'error');
    return;
  }

  localStorage.setItem('user', JSON.stringify({
    username,
    name: fullname,
    email
  }));

  showToast('Account created successfully!', 'success');
  setTimeout(() => window.location.href = 'index.html', 800);
});
</script>
</body>
</html>
