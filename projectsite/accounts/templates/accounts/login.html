{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CookingBuddy</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
     :root {
    --red-primary: #e63946;
    --red-dark: #c1121f;
    --red-light: #ff6b6b;
    --red-bg: #fff5f5;
    --white: #ffffff;
    --text-dark: #2b2d42;
    --text-light: #6c757d;
    --text-sub: #8a8f98;
    --border: #ece6d8;
    --shadow: 0 4px 6px rgba(0,0,0,.08);
    --shadow-lg: 0 10px 25px rgba(0,0,0,.12);
    --radius: 14px;
    --radius-lg: 20px;
    }

    /* RESET */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        background: linear-gradient(180deg, #fffaf8 0%, #fff1f2 100%);
        color: var(--text-dark);
    }

    /* WRAPPER */
    .auth-wrapper {
        display: flex;
        min-height: 100vh;
    }

    /* LEFT SIDE */
    .left {
        flex: 1;
        position: relative;
        min-height: 100vh;
        overflow: hidden;
    }

    /* FIX: prevent image from stretching too tall */
    .left img {
        width: 100%;
        height: 100%;
        max-height: 100vh;
        object-fit: cover;
    }

    /* overlay stays centered better */
    .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,.4);
        color: #fff;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 40px;
    }


    .overlay h1 {
        font-size: 3rem;
        margin-bottom: 10px;
    }

    /* RIGHT SIDE */
    .right {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px;
    }

    /* CARD */
    .card {
        width: 100%;
        max-width: 450px;
        background: #fff;
        padding: 35px;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
    }

    /* LOGO */
    .logo {
        text-align: center;
        margin-bottom: 30px;
    }

    .brand-icon {
        width: 60px;
        height: 60px;
        margin: auto;
        border-radius: 15px;
        background: var(--red-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--red-primary);
        font-size: 1.5rem;
    }

    .logo h2 {
        margin-top: 15px;
    }

    .logo span {
        color: var(--red-primary);
    }

    .logo p {
        color: var(--text-light);
    }

    /* FORM */
    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
    }

    input,
    select,
    textarea {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid var(--border);
        border-radius: 12px;
        font-size: 15px;
        outline: none;
    }

    input:focus,
    textarea:focus {
        border-color: var(--red-primary);
        box-shadow: 0 0 0 4px rgba(230,57,70,.12);
    }

    /* BUTTONS */
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        font-weight: 600;
        text-decoration: none;
        transition: .2s;
    }

    .btn:hover {
        transform: translateY(-2px);
    }

    .btn-login {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--red-primary), var(--red-dark));
        color: #fff;
    }

    /* DIVIDER */
    .divider {
        text-align: center;
        margin: 20px 0;
        color: var(--text-sub);
    }

    /* GOOGLE */
    .google-btn {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        color: #db4437;
        font-weight: 600;
    }

    /* REGISTER */
    .register {
        margin-top: 20px;
        text-align: center;
    }

    .register a {
        color: var(--red-primary);
        font-weight: 700;
        text-decoration: none;
    }

    /* =========================
    RESPONSIVE DESIGN
    ========================= */

   @media (max-width: 768px) {

    /* STACK layout instead of side-by-side */
    body {
        flex-direction: column;
    }

    .left {
        flex: none;
        height: 160px;
        min-height: 160px;
    }

    .left img {
        height: 100%;
        width: 100%;
        object-fit: cover;
    }

    .overlay {
        padding: 12px;
        justify-content: center;
        text-align: center;
    }

    .overlay h1 {
        font-size: 1.4rem;
        margin: 0;
    }

    .overlay p {
        font-size: 0.85rem;
        margin: 5px 0 0;
    }

    .right {
        flex: none;
        width: 100%;
        padding: 20px 16px;
    }

    .card {
        padding: 20px;
        border-radius: 14px;
    }
}
    </style>
</head>
<body>

<div class="left">
    <img src="https://images.unsplash.com/photo-1498837167922-ddd27525d352?w=1200" alt="Cooking">
    <div class="overlay">
        <h1>Welcome Back!</h1>
        <p>Access your recipes, reviews, and cooking adventures.</p>
    </div>
</div>

        <div class="right">
            <div class="card">

            <div class="logo">

            <div class="brand-icon">
                <i class="fas fa-utensils"></i>
            </div>

            <h2>
                Cooking<span>Buddy</span>
            </h2>

            <p>Sign in to your account</p>

        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label>Password</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn btn-login">
                Login
            </button>
        </form>

        <div class="divider">
            OR
        </div>

        <a href="/accounts/google/login/" class="google-btn">
            <i class="fab fa-google"></i>
            Login with Google
        </a>

        <div class="register">
            Don't have an account?
            <a href="{% url 'register' %}">
                Register
            </a>
        </div>

    </div>
</div>

</body>
</html>
