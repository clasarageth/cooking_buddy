<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — RecipeBook</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand"><div class="brand-icon"><i class="fas fa-utensils"></i></div>Recipe<span>Book</span></a>
      <div style="margin-left:auto;display:flex;gap:10px">
        <a href="login.html" class="btn btn-primary btn-sm">Login</a>
        <a href="register.html" class="btn btn-secondary btn-sm">Sign Up</a>
      </div>
    </div>
  </div>
</nav>

<div class="auth-page">
  <!-- Visual Panel -->
  <div class="auth-visual">
    <img src="https://images.unsplash.com/photo-1498837167922-ddd27525d352?w=800&auto=format&fit=crop&q=80" alt="Cooking">
    <div class="auth-visual-overlay">
      <div class="auth-visual-title">Welcome Back, Chef!</div>
      <p class="auth-visual-sub">Log in to access your saved recipes, favorites, and cooking history.</p>
    </div>
  </div>

  <!-- Form Panel -->
  <div class="auth-form-panel">
    <div class="auth-form-box">
      <div style="text-align:center;margin-bottom:32px">
        <a href="index.html" class="navbar-brand" style="justify-content:center;display:inline-flex;margin-bottom:20px">
          <div class="brand-icon"><i class="fas fa-utensils"></i></div>
          Recipe<span>Book</span>
        </a>
        <h2>Welcome Back</h2>
        <p style="color:var(--text-light);margin-top:4px">Sign in to your account</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <div class="input-group">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" class="form-control" id="login-email" placeholder="you@example.com" autocomplete="email">
          </div>
          <span class="form-error" id="email-error"></span>
        </div>

        <div class="form-group">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
            <label class="form-label" for="login-password" style="margin-bottom:0">Password</label>
            <a href="#" style="font-size:.82rem;color:var(--orange);font-weight:600">Forgot password?</a>
          </div>
          <div class="input-group">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" class="form-control" id="login-password" placeholder="Enter your password" autocomplete="current-password">
            <button type="button" class="input-eye" aria-label="Toggle password">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <span class="form-error" id="password-error"></span>
        </div>

        <div class="form-group">
          <label class="checkbox-group">
            <input type="checkbox" id="remember-me">
            <span>Remember me for 30 days</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <div class="auth-divider"><span>or continue with</span></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <button class="social-btn" onclick="showToast('Google login coming soon!','info')">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="social-btn" onclick="showToast('Facebook login coming soon!','info')">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </button>
      </div>

      <p class="auth-footer">Don't have an account? <a href="register.html">Sign up free</a></p>

      <!-- Demo hint -->
      <div style="margin-top:20px;padding:14px;background:rgba(255,140,66,0.08);border-radius:var(--radius-sm);border:1px solid rgba(255,140,66,0.2)">
        <p style="font-size:.8rem;color:var(--text-sub);margin:0"><i class="fas fa-info-circle" style="color:var(--orange);margin-right:6px"></i><strong>Demo:</strong> Enter any email and password to log in.</p>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="script.js"></script>
</body>
</html>
